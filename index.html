<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖片尺寸調整器</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; text-align: center; }
    .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
    canvas { max-width: 100%; border: 1px dashed #ccc; margin-top: 20px; }
    button { padding: 10px 20px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background-color: #0056b3; }
    input[type="number"] { width: 80px; padding: 5px; text-align: center; }
  </style>
</head>
<body>
  <h1>圖片尺寸調整器</h1>
  <input type="file" id="upload" accept="image/*">
  
  <div class="controls" style="display: none;" id="controls">
    <div>
      <label>寬度: <input type="number" id="width"> px</label>
      <span style="margin: 0 10px;">x</span>
      <label>高度: <input type="number" id="height"> px</label>
    </div>
    <div>
      <label><input type="checkbox" id="keepRatio" checked> 保持等比例</label>
    </div>
    <button id="downloadBtn">下載調整後的圖片</button>
  </div>

  <canvas id="canvas" style="display: none;"></canvas>

  <script>
    // 註冊 Service Worker (針對 GitHub Pages 子目錄優化)
    if ('serviceWorker' in navigator) {
      // 取得當前目錄路徑，確保 sw.js 註冊在正確的 Scope
      const swPath = location.pathname.substring(0, location.pathname.lastIndexOf('/')) + '/sw.js';
      navigator.serviceWorker.register(swPath).then(() => console.log('SW 註冊成功'));
    }

    const upload = document.getElementById('upload');
    const widthInput = document.getElementById('width');
    const heightInput = document.getElementById('height');
    const keepRatioCheckbox = document.getElementById('keepRatio');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const controls = document.getElementById('controls');
    const downloadBtn = document.getElementById('downloadBtn');

    let img = new Image();
    let originalRatio = 1;

    upload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        img.onload = () => {
          originalRatio = img.width / img.height;
          widthInput.value = img.width;
          heightInput.value = img.height;
          controls.style.display = 'flex';
          canvas.style.display = 'block';
          drawImage();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    function drawImage() {
      const w = parseInt(widthInput.value);
      const h = parseInt(heightInput.value);
      if (!w || !h) return;
      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
    }

    widthInput.addEventListener('input', () => {
      if (keepRatioCheckbox.checked && widthInput.value) {
        heightInput.value = Math.round(widthInput.value / originalRatio);
      }
      drawImage();
    });

    heightInput.addEventListener('input', () => {
      if (keepRatioCheckbox.checked && heightInput.value) {
        widthInput.value = Math.round(heightInput.value * originalRatio);
      }
      drawImage();
    });

    downloadBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'resized-image.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  </script>
</body>
</html>
