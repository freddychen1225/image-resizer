<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖片尺寸調整器</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; text-align: center; }
    
    /* 標題與上傳區塊樣式 */
    h1 { font-size: 2rem; }

    .upload-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 30px 0;
      gap: 15px;
    }

    /* 按鈕與文字縮小至與標題相近的尺寸 */
    .huge-btn {
      font-size: 2rem; 
      padding: 15px 30px;
      background-color: #28a745;
      color: white;
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      max-width: 90vw;
      box-sizing: border-box;
      line-height: 1.2;
    }
    
    .huge-btn:active {
      background-color: #218838;
      transform: scale(0.98);
    }

    .huge-text {
      font-size: 2rem; 
      color: #666;
      font-weight: bold;
      max-width: 90vw;
      word-break: break-all;
      text-align: center;
    }

    /* 寬高輸入區塊 - 使用 CSS Grid 達成整齊對齊 */
    .controls { 
      margin-top: 20px; 
      display: flex; 
      flex-direction: column; 
      gap: 15px; 
      align-items: center; 
    }

    .input-grid {
      display: grid;
      /* 定義 3 個直行：標籤 (自動寬度)、輸入框 (固定100px)、單位 px (自動寬度) */
      grid-template-columns: auto 100px auto;
      row-gap: 15px;     /* 上下行的間距 */
      column-gap: 10px;  /* 左右欄的間距 */
      align-items: center; /* 垂直置中對齊 */
      font-size: 1.2rem;
      text-align: right;   /* 讓標籤靠右對齊輸入框 */
    }

    .input-grid input[type="number"] { 
      width: 100px; 
      padding: 8px; 
      text-align: center; 
      font-size: 1.2rem; 
      box-sizing: border-box;
    }

    /* 其他元素樣式 */
    canvas { max-width: 100%; border: 1px dashed #ccc; margin-top: 20px; }
    
    #downloadBtn { 
      padding: 15px 30px; 
      background-color: #007BFF; 
      color: white; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-size: 1.2rem; 
    }
    #downloadBtn:hover { background-color: #0056b3; }
  </style>
</head>
<body>
  <h1>圖片尺寸調整器</h1>
  
  <div class="upload-area">
    <label for="upload" class="huge-btn">選擇檔案</label>
    <div id="file-status" class="huge-text">尚未選取檔案</div>
  </div>
  
  <input type="file" id="upload" accept="image/*" style="display: none;">
  
  <div class="controls" style="display: none;" id="controls">
    
    <!-- 改用 CSS Grid 排版來完美對齊 -->
    <div class="input-grid">
      <label>寬度:</label>
      <input type="number" id="width">
      <span>px</span>

      <label>高度:</label>
      <input type="number" id="height">
      <span>px</span>
    </div>

    <div style="font-size: 1.2rem;">
      <label><input type="checkbox" id="keepRatio" checked style="transform: scale(1.5); margin-right: 10px;"> 保持等比例</label>
    </div>
    
    <button id="downloadBtn">下載 / 儲存圖片</button>
  </div>

  <canvas id="canvas" style="display: none;"></canvas>

  <script>
    if ('serviceWorker' in navigator) {
      const swPath = location.pathname.substring(0, location.pathname.lastIndexOf('/')) + '/sw.js';
      navigator.serviceWorker.register(swPath).then(() => console.log('SW 註冊成功'));
    }

    const upload = document.getElementById('upload');
    const widthInput = document.getElementById('width');
    const heightInput = document.getElementById('height');
    const keepRatioCheckbox = document.getElementById('keepRatio');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const controls = document.getElementById('controls');
    const downloadBtn = document.getElementById('downloadBtn');
    const fileStatus = document.getElementById('file-status');

    let img = new Image();
    let originalRatio = 1;

    upload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) {
        fileStatus.textContent = '尚未選取檔案';
        controls.style.display = 'none';
        canvas.style.display = 'none';
        return;
      }

      fileStatus.textContent = file.name;

      const reader = new FileReader();
      reader.onload = (event) => {
        img.onload = () => {
          originalRatio = img.width / img.height;
          widthInput.value = img.width;
          heightInput.value = img.height;
          controls.style.display = 'flex';
          canvas.style.display = 'block';
          drawImage();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    function drawImage() {
      const w = parseInt(widthInput.value);
      const h = parseInt(heightInput.value);
      if (!w || !h) return;
      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
    }

    widthInput.addEventListener('input', () => {
      if (keepRatioCheckbox.checked && widthInput.value) {
        heightInput.value = Math.round(widthInput.value / originalRatio);
      }
      drawImage();
    });

    heightInput.addEventListener('input', () => {
      if (keepRatioCheckbox.checked && heightInput.value) {
        widthInput.value = Math.round(heightInput.value * originalRatio);
      }
      drawImage();
    });

    downloadBtn.addEventListener('click', async () => {
      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      if (!blob) return;

      const file = new File([blob], 'resized-image.png', { type: 'image/png' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: '下載調整後的圖片'
          });
          console.log('分享/儲存成功');
        } catch (error) {
          console.log('使用者取消或分享失敗', error);
        }
      } else {
        const link = document.createElement('a');
        link.download = 'resized-image.png';
        link.href = URL.createObjectURL(blob);
        link.click();
        
        setTimeout(() => URL.revokeObjectURL(link.href), 100);
      }
    });
  </script>
</body>
</html>
